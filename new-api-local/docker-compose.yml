# new-api 本地开发环境
# 用于 Super OpenCode 托管服务开发测试

version: '3.8'

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3001:3000"  # 映射到 3001 避免与其他服务冲突
    environment:
      # 基础配置
      - TZ=Asia/Shanghai
      - SQL_DSN=file:/data/new-api.db  # SQLite 数据库
      # 初始管理员账号
      - INITIAL_ROOT_TOKEN=sk-dev-root-token-12345
      # 会话配置
      - SESSION_SECRET=super-opencode-dev-secret-key
      # 开启注册
      - REGISTER_ENABLED=true
      # 邮箱验证（开发环境关闭）
      - EMAIL_VERIFICATION=false
      # 日志级别
      - LOG_LEVEL=debug
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

# 数据持久化说明：
# - SQLite 数据库存储在 ./data/new-api.db
# - 重启容器数据不会丢失
# - 如需重置，删除 ./data 目录即可
